<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理 一問一答：磁界</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section id="menu" class="card">
      <h1>物理 一問一答</h1>
      <p class="subtitle">磁界・コイル・フレミングの法則・モーター</p>
      <button id="startBtn">最初から</button>
      <button id="reviewBtn">間違えた問題</button>
      <button id="resetBtn" class="sub">履歴リセット</button>
      <p id="status"></p>
    </section>

    <section id="quiz" class="card hidden">
      <div class="top">
        <span id="count"></span>
        <button id="backBtn" class="small">メニュー</button>
      </div>
      <h2 id="question"></h2>
      <input id="answerInput" type="text" placeholder="答えを入力">
      <div class="buttons">
        <button id="showBtn">答えを見る</button>
      </div>
      <div id="answerBox" class="answer hidden"></div>
      <div class="buttons hidden" id="judgeButtons">
        <button id="correctBtn">正解</button>
        <button id="wrongBtn" class="wrong">不正解</button>
      </div>
    </section>

    <section id="result" class="card hidden">
      <h2>終了</h2>
      <p id="resultText"></p>
      <button id="againBtn">もう一度</button>
      <button id="menuBtn">メニューへ</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
